name: Docker Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - ingestion
          - ai_worker_frame
          - ai_worker_temporal
          - query_service
          - pfm
          - verification
          - rag_forensics
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          tags: omnisight/${{ matrix.service }}:${{ github.sha }}
